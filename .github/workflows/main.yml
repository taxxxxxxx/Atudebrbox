echo "2) VersГЈo Nova (WOW64 - Recomendada)"
echo ""
read -p "Digite o nГәmero da opГ§ГЈo: " i

INSTALL_WOW64=0
if [ "$i" = "2" ]; then
  INSTALL_WOW64=1
fi

# ==============================================
# в¬ҮпёҸ  DOWNLOAD E INSTALAГҮГғO
# ==============================================
echo ""
