# вңЁ PERMISSГ•ES E PREPARAГҮГғO
# ==============================================
echo "рҹ“Ӯ Solicitando permissГЈo de armazenamento..."
termux-setup-storage

sleep 3

if [ -d ~/storage/shared ]; then
  echo "вң… PermissГЈo concedida!"
else
  echo "вқҢ Erro! Rode novamente e permita."
  exit 1
fi

# ==============================================
